services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - '5432:5432'
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel -d sentinel']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sentinel-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://sentinel:sentinel@postgres:5432/sentinel
      SESSION_SECRET: ${SESSION_SECRET:-dev_secret_change_me_dev_secret_change_me}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@sentinel.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin-change-me}
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "pnpm db:migrate && pnpm dev"

volumes:
  sentinel_pgdata:
